<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://kit.fontawesome.com/1626dc2da5.js" crossorigin="anonymous"></script>
    <title>Signup - MzansiBuilds</title>
    <link rel="stylesheet" href="/public/css/styles.css">
</head>

<body style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;background:#f8fafc;">
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <h2>Signup</h2>
                <p>Enter your details to create your new <b>MzansiBuilds</b> account</p>
            </div>

            <form class="login-form" id="signupForm" novalidate>
                <div class="form-group">
                    <div class="input-wrapper">
                        <input type="text" id="name" name="name" required autocomplete="name" placeholder>
                        <label for="name">Name</label>
                    </div>
                    <span class="error-message" id="nameError"></span>
                </div>
                <div class="form-group">
                    <div class="input-wrapper">
                        <input type="text" id="surname" name="surname" required autocomplete="family-name" placeholder>
                        <label for="surname">Surname</label>
                    </div>
                    <span class="error-message" id="surnameError"></span>
                </div>

                <div class="form-group">
                    <div class="input-wrapper">
                        <input type="email" id="email" name="email" required autocomplete="email" placeholder>
                        <label for="email">Email Address</label>
                    </div>
                    <span class="error-message" id="emailError"></span>
                </div>

                <div class="form-group">
                    <div class="input-wrapper password-wrapper">
                        <input type="password" id="password" name="password" required autocomplete="new-password">
                        <label for="password">Password</label>
                        <button type="button" class="password-toggle" id="passwordToggle"
                            aria-label="Toggle password visibility">
                            <span class="eye-icon"></span>
                        </button>
                    </div>
                    <span class="error-message" id="passwordError"></span>
                </div>


                <button type="submit" class="login-btn">
                    <span class="btn-text">Sign Up</span>
                    <span class="btn-loader"></span>
                </button>
            </form>

            <div class="signup-link">
                <p>Already have an account? <a href="login.html">Sign in</a></p>
            </div>

            <div class="signup-link">
                <p><a href="../../index.html"><i class="fa-solid fa-house"></i></a></p>
            </div>

            <div class="success-message" id="successMessage">
                <div class="success-icon">✓</div>
                <h3>Signup Successful!</h3>
                <p>Redirecting to your sign in page...</p>
            </div>
        </div>
    </div>
    <script src="../config/app-config.js"></script>
    <script src="../js/supabaseClient.js"></script>
    <script src="../js/shared.js"></script>
</body>

</html>
