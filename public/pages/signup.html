<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="../assets/img/build.png">
    <title>Sign Up - MzansiBuilds</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://kit.fontawesome.com/1626dc2da5.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="../css/styles.css" />
</head>

<body class="auth-page">
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <h2>Sign Up</h2>
                <p>Enter your details to create your <b>MzansiBuilds</b> account</p>
            </div>

            <form class="login-form" id="signupForm" novalidate>
                <div class="form-group">
                    <div class="input-wrapper">
                        <input id="name" name="name" type="text" required autocomplete="name" placeholder="Name" />
                    </div>
                </div>

                <div class="form-group">
                    <div class="input-wrapper">
                        <input id="surname" name="surname" type="text" required autocomplete="family-name"
                            placeholder="Surname" />
                    </div>
                </div>

                <div class="form-group">
                    <div class="input-wrapper">
                        <input id="email" name="email" type="email" required autocomplete="email"
                            placeholder="Email Address" />
                    </div>
                </div>

                <div class="form-group">
                    <div class="input-wrapper password-wrapper">
                        <input id="password" name="password" type="password" required autocomplete="new-password"
                            placeholder="Password" />
                        <button type="button" class="password-toggle" id="passwordToggle"
                            aria-label="Toggle password visibility">
                            <span class="eye-icon" id="eyeIcon"></span>
                        </button>
                    </div>
                </div>

                <button type="submit" class="login-btn" id="signupBtn">
                    <span class="btn-text">Sign Up</span>
                    <span class="btn-loader"></span>
                </button>
            </form>

            <p id="message" class="error-message"></p>

            <div class="signup-link">
                <p>Already have an account? <a href="login.html">Sign in</a></p>
                <p><a href="../../index.html"><i class="fa-solid fa-house"></i></a></p>
            </div>
        </div>
    </div>

    <footer class="footer">
        <div class="container">
            <p>&copy; <span id="year"></span> MzansiBuilds.</p>
        </div>
    </footer>

</body>

</html>
