<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="../assets/img/build.png">
    <title>Celebration Wall - MzansiBuilds</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://kit.fontawesome.com/1626dc2da5.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="../css/styles.css" />

    <style>
        #app {
            display: none;
            max-width: 900px;
            margin: 0 auto;
            margin-top: 1.5rem;
        }
    </style>
</head>

<body>
    <nav class="navbar">
        <div class="container">
            <a href="../../index.html" class="navbar-brand">MzansiBuilds</a>
            <div class="nav-links">
                <a href="./dashboard.html">Live Feed</a>
                <a href="./project.html">Create Project</a>
                <a href="./my-projects.html">My Projects</a>
                <a href="./profile.html">Profile</a>
                <a href="./celebration.html">Celebration Wall</a>
                <button id="logoutBtnNav" class="nav-logout" type="button">Logout</button>
            </div>
            <button class="mobile-toggle" onclick="toggleMobileMenu()" aria-label="Open navigation menu">☰</button>
        </div>
        <div id="mobile-menu" class="mobile-menu">
            <a href="./dashboard.html">Live Feed</a>
            <a href="./project.html">Create Project</a>
            <a href="./my-projects.html">My Projects</a>
            <a href="./profile.html">Profile</a>
            <a href="./celebration.html">Celebration Wall</a>
            <button id="logoutBtnMobile" type="button">Logout</button>
        </div>
    </nav>

    <main id="app">
        <h1>Celebration Wall <i class="fa-solid fa-champagne-glasses"></i></h1>
        <div id="completedProjects"></div>
    </main>

    <footer class="footer">
        <div class="container">
            <p>&copy; <span id="year"></span> MzansiBuilds.</p>
        </div>
    </footer>

    <script src="../js/supabaseClient.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/celebration.js"></script>

    <script>
        // Toggle the mobile navigation menu
        function toggleMobileMenu() {
            const menu = document.getElementById("mobile-menu");
            if (menu) {
                menu.classList.toggle("open");
            }
        }

        // Set the current year in the footer
        const yearEl = document.getElementById("year");
        if (yearEl) {
            yearEl.textContent = new Date().getFullYear();
        }

        // Get references to important DOM elements
        const app = document.getElementById("app");
        const completedProjects = document.getElementById("completedProjects");
        const logoutBtnNav = document.getElementById("logoutBtnNav");
        const logoutBtnMobile = document.getElementById("logoutBtnMobile");

        // Handle user logout
        async function performLogout() {
            await window.supabaseClient.auth.signOut();
            window.location.replace("./login.html");
        }

        // Attach logout handlers to both desktop and mobile logout buttons
        logoutBtnNav.addEventListener("click", performLogout);
        logoutBtnMobile.addEventListener("click", performLogout);

        async function protectPage() {
            const { data: sessionData, error: sessionError } =
                await window.supabaseClient.auth.getSession();

            if (sessionError || !sessionData.session) {
                window.location.replace("./login.html");
                return;
            }

            const { data: userData, error: userError } =
                await window.supabaseClient.auth.getUser();

            if (userError || !userData.user) {
                await window.supabaseClient.auth.signOut();
                window.location.replace("./login.html");
                return;
            }

            window.supabaseClient.auth.onAuthStateChange((event, session) => {
                if (!session) {
                    window.location.replace("./login.html");
                }
            });

            app.style.display = "block";
        }

        // Load completed projects and display them on the celebration wall
        async function loadCelebrationWall() {
            try {
                const projects = await fetchCompletedProjects();

                if (!projects.length) {
                    completedProjects.innerHTML = "<p>No completed projects yet.</p>";
                    return;
                }

                completedProjects.innerHTML = projects.map(project => `
          <div class="project-card">
            <h3>${project.title}</h3>
            <p><strong>By:</strong> ${project.profiles?.name ?? "Unknown"} ${project.profiles?.surname ?? ""}</p>
            <p>${project.description || "No description provided."}</p>
            <p><strong>Completed:</strong> ${new Date(project.updated_at).toLocaleString()}</p>
          </div>
        `).join("");
            } catch (err) {
                completedProjects.innerHTML = `<p>${err.message}</p>`;
            }
        }

        async function initPage() {
            await protectPage();
            await loadCelebrationWall();
        }

        initPage();
    </script>
</body>

</html>
