<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - MzansiBuilds</title>
    <link rel="icon" type="image/png" href="../assets/img/build.png">

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://kit.fontawesome.com/1626dc2da5.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="../css/styles.css" />
</head>

<body class="auth-page">
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <h2>Sign In</h2>
                <p>Enter your credentials to access your <b>MzansiBuilds</b> account</p>
            </div>

            <form class="login-form" id="loginForm" novalidate>
                <div class="form-group">
                    <div class="input-wrapper">
                        <input type="email" id="email" name="email" required autocomplete="email"
                            placeholder="Email Address">
                    </div>
                </div>

                <div class="form-group">
                    <div class="input-wrapper password-wrapper">
                        <input type="password" id="password" name="password" required autocomplete="current-password"
                            placeholder="Password">
                        <button type="button" class="password-toggle" id="passwordToggle"
                            aria-label="Toggle password visibility">
                            <span class="eye-icon" id="eyeIcon"></span>
                        </button>
                    </div>
                </div>

                <div class="form-options">
                    <label class="remember-wrapper">
                        <input type="checkbox" id="remember" name="remember">
                        <span class="checkbox-label">
                            <span class="checkmark"></span>
                            Remember me
                        </span>
                    </label>
                    <a href="#" class="forgot-password">Forgot password?</a>
                </div>

                <button type="submit" class="login-btn" id="loginBtn">
                    <span class="btn-text">Sign In</span>
                    <span class="btn-loader"></span>
                </button>
            </form>

            <p id="message" class="error-message"></p>

            <div class="signup-link">
                <p>Don't have an account? <a href="signup.html">Create one</a></p>
                <p><a href="../../index.html"><i class="fa-solid fa-house"></i></a></p>
            </div>
        </div>
    </div>

    <footer class="footer">
        <div class="container">
            <p>&copy; <span id="year"></span> MzansiBuilds.</p>
        </div>
    </footer>
    <script src="supabaseClient.js"></script>
    <script src="auth.js"></script>
    <script>

        //get references to DOM elements
        const form = document.getElementById("loginForm");
        const message = document.getElementById("message");
        const passwordInput = document.getElementById("password");
        const passwordToggle = document.getElementById("passwordToggle");
        const eyeIcon = document.getElementById("eyeIcon");
        const loginBtn = document.getElementById("loginBtn");
        const yearEl = document.getElementById("year");

        //for the footer year
        if (yearEl) {
            yearEl.textContent = new Date().getFullYear();
        }

        //event listener for password visibility toggle
        passwordToggle.addEventListener("click", () => {
            const showPassword = passwordInput.type === "password";
            passwordInput.type = showPassword ? "text" : "password";
            eyeIcon.classList.toggle("show-password", showPassword);
        });

        //event listener for form submission
        form.addEventListener("submit", async (e) => {
            e.preventDefault();

            //get email and password values
            const email = document.getElementById("email").value.trim();
            const password = document.getElementById("password").value;
            message.textContent = "";
            //show loading state on button
            loginBtn.classList.add("loading");

            //attempt to sign in the user
            try {
                await signInUser(email, password);
                window.location.href = "./dashboard.html";
            } catch (err) {
                message.textContent = err.message;
            } finally {
                loginBtn.classList.remove("loading");
            }
        });
    </script>
</body>

</html>
