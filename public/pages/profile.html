<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8" />


    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="icon" type="image/png" href="../assets/img/build.png">

    <title>My Profile - MzansiBuilds</title>


    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="../css/styles.css" />

    <style>
        #app {
            display: none;
            max-width: 650px;
            margin: 0 auto;
            margin-top: 1.5rem;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 1.5rem;
            box-shadow: 0 4px 12px rgba(26, 46, 26, 0.06);
        }

        form div {
            margin-bottom: 1rem;
        }

        #message {
            margin-top: 1rem;
            font-weight: bold;
            color: var(--muted-fg);
        }

        .readonly {
            background-color: #edf1ed;
            color: var(--muted-fg);
        }
    </style>
</head>

<body>
    <nav class="navbar">
        <div class="container">
            <a href="../../index.html" class="navbar-brand">MzansiBuilds</a>
            <div class="nav-links">
                <a href="./dashboard.html">Live Feed</a>
                <a href="./project.html">Create Project</a>
                <a href="./my-projects.html">My Projects</a>
                <a href="./profile.html">Profile</a>
                <a href="./celebration.html">Celebration Wall</a>
                <button id="logoutBtnNav" class="nav-logout" type="button">Logout</button>
            </div>
            <button class="mobile-toggle" onclick="toggleMobileMenu()" aria-label="Open navigation menu">☰</button>
        </div>
        <div id="mobile-menu" class="mobile-menu">
            <a href="./dashboard.html">Live Feed</a>
            <a href="./project.html">Create Project</a>
            <a href="./my-projects.html">My Projects</a>
            <a href="./profile.html">Profile</a>
            <a href="./celebration.html">Celebration Wall</a>
            <button id="logoutBtnMobile" type="button">Logout</button>
        </div>
    </nav>

    <main id="app">
        <h1>My Profile</h1>

        <form id="profileForm">
            <div>
                <label for="name">Name</label>
                <input id="name" type="text" required />
            </div>

            <div>
                <label for="surname">Surname</label>
                <input id="surname" type="text" required />
            </div>

            <div>
                <label for="email">Email</label>
                <input id="email" type="email" class="readonly" readonly />
            </div>

            <div>
                <label for="createdAt">Member Since</label>
                <input id="createdAt" type="text" class="readonly" readonly />
            </div>

            <button type="submit">Update Profile</button>
        </form>

        <p id="message"></p>
    </main>

    <footer class="footer">
        <div class="container">
            <p>&copy; <span id="year"></span> MzansiBuilds.</p>
        </div>
    </footer>

    <script src="../js/supabaseClient.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/profile.js"></script>


    <script>
        // Toggle mobile menu visibility
        function toggleMobileMenu() {
            const menu = document.getElementById("mobile-menu");
            if (menu) {
                menu.classList.toggle("open");
            }
        }

        // Set the current year in the footer.
        const yearEl = document.getElementById("year");
        if (yearEl) {
            yearEl.textContent = new Date().getFullYear();
        }


        // Grab references to important page elements.

        const app = document.getElementById("app");
        const form = document.getElementById("profileForm");
        const message = document.getElementById("message");
        const logoutBtnNav = document.getElementById("logoutBtnNav");
        const logoutBtnMobile = document.getElementById("logoutBtnMobile");

        async function performLogout() {
            await window.supabaseClient.auth.signOut();
            window.location.replace("./login.html");
        }

        logoutBtnNav.addEventListener("click", performLogout);
        logoutBtnMobile.addEventListener("click", performLogout);


        //  Protect the page by checking whether the user is logged in.

        async function protectPage() {
            const { data: sessionData, error: sessionError } =
                await window.supabaseClient.auth.getSession();

            if (sessionError || !sessionData.session) {

                window.location.replace("./login.html");
                return;
            }

            const { data: userData, error: userError } =
                await window.supabaseClient.auth.getUser();

            if (userError || !userData.user) {
                await window.supabaseClient.auth.signOut();
                window.location.replace("./login.html");
                return;
            }

            window.supabaseClient.auth.onAuthStateChange((event, session) => {
                if (!session) {
                    window.location.replace("./login.html");
                }
            });

            app.style.display = "block";
        }


        //Load the current user's profile data and fill the form.

        async function loadProfile() {
            try {

                // Fetch the logged-in user's profile row.
                const profile = await window.fetchMyProfile();

                // Fill the form fields with current profile values.
                document.getElementById("name").value = profile.name || "";
                document.getElementById("surname").value = profile.surname || "";
                document.getElementById("email").value = profile.email || "";
                document.getElementById("createdAt").value =
                    new Date(profile.created_at).toLocaleString();
            } catch (err) {
                message.textContent = err.message;
            }
        }


        //  Handle profile form submission.

        form.addEventListener("submit", async (e) => {

            // Prevent normal browser form submission.

            e.preventDefault();


            //  Build the updated profile object from the form fields.

            const profile = {
                name: document.getElementById("name").value.trim(),
                surname: document.getElementById("surname").value.trim()
            };

            try {

                // Send the update request to Supabase.

                const updatedProfile = await window.updateMyProfile(profile);


                //  Refresh the visible values using the returned updated row.

                document.getElementById("name").value = updatedProfile.name || "";
                document.getElementById("surname").value = updatedProfile.surname || "";


                //Show success feedback.

                message.textContent = "Profile updated successfully.";
            } catch (err) {

                // Show any error message.

                message.textContent = err.message;
            }
        });


        // Initialize the page

        async function initPage() {
            await protectPage();
            await loadProfile();
        }

        initPage();
    </script>


</body>

</html>
