<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/public/css/styles.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <title>Profile — MzansiBuilds</title>
</head>

<body>
    <nav class="navbar">
        <div class="container">
            <a href="../../index.html" class="navbar-brand">MzansiBuilds</a>
            <div class="nav-links">
                <a href="feed.html">Feed</a>
                <a href="celebration-wall.html">Celebration Wall</a>
                <span id="auth-links"></span>
            </div>
            <button class="mobile-toggle" onclick="toggleMobileMenu()">☰</button>
        </div>
        <div id="mobile-menu" class="mobile-menu">
            <a href="feed.html">Feed</a>
            <a href="celebration-wall.html">Celebration Wall</a>
            <span id="auth-links-mobile"></span>
        </div>
    </nav>

    <div class="container py-8" style="max-width:760px;">
        <div class="mb-6">
            <h1>Profile</h1>
            <p class="text-muted">Manage your account details</p>
        </div>

        <div class="card">
            <div class="card-content" style="padding-top:1.25rem;">
                <form id="profileForm" class="space-y-4">
                    <div class="form-group">
                        <label for="profileName">Name</label>
                        <input id="profileName" type="text" class="form-input" required>
                    </div>

                    <div class="form-group">
                        <label for="profileSurname">Surname</label>
                        <input id="profileSurname" type="text" class="form-input" required>
                    </div>

                    <div class="form-group">
                        <label for="profileEmail">Email</label>
                        <input id="profileEmail" type="email" class="form-input" required>
                    </div>

                    <div class="flex items-center" style="gap:0.5rem; flex-wrap:wrap;">
                        <button id="profileSaveBtn" type="submit" class="btn btn-primary">Save Profile</button>
                        <a href="my-projects.html" class="btn btn-outline">Back to My Projects</a>
                    </div>

                    <p id="profileStatus" class="text-sm text-muted"></p>
                </form>
            </div>
        </div>
    </div>

    <script src="../config/app-config.js"></script>
    <script src="../js/supabaseClient.js"></script>
    <script src="../js/shared.js"></script>
</body>

</html>
