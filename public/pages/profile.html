<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8" />


    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="icon" type="image/png" href="../assets/img/build.png">

    <title>My Profile - MzansiBuilds</title>
    <link rel="icon" type="image/png" href="../assets/img/build.png">


    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="styles.css" />

    <style>
        #app {
            display: none;
            max-width: 650px;
            margin: 0 auto;
            margin-top: 1.5rem;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 1.5rem;
            box-shadow: 0 4px 12px rgba(26, 46, 26, 0.06);
        }

        form div {
            margin-bottom: 1rem;
        }

        #message {
            margin-top: 1rem;
            font-weight: bold;
            color: var(--muted-fg);
        }

        .readonly {
            background-color: #edf1ed;
            color: var(--muted-fg);
        }
    </style>
</head>

<body>
    <nav class="navbar">
        <div class="container">
            <a href="../../index.html" class="navbar-brand">MzansiBuilds</a>
            <div class="nav-links">
                <a href="./dashboard.html">Live Feed</a>
                <a href="./project.html">Create Project</a>
                <a href="./my-projects.html">My Projects</a>
                <a href="./profile.html">Profile</a>
                <a href="./celebration.html">Celebration Wall</a>
                <button id="logoutBtnNav" class="nav-logout" type="button">Logout</button>
            </div>
            <button class="mobile-toggle" onclick="toggleMobileMenu()" aria-label="Open navigation menu">☰</button>
        </div>
        <div id="mobile-menu" class="mobile-menu">
            <a href="./dashboard.html">Live Feed</a>
            <a href="./project.html">Create Project</a>
            <a href="./my-projects.html">My Projects</a>
            <a href="./profile.html">Profile</a>
            <a href="./celebration.html">Celebration Wall</a>
            <button id="logoutBtnMobile" type="button">Logout</button>
        </div>
    </nav>

    <main id="app">
        <h1>My Profile</h1>

        <form id="profileForm">
            <div>
                <label for="name">Name</label>
                <input id="name" type="text" required />
            </div>

            <div>
                <label for="surname">Surname</label>
                <input id="surname" type="text" required />
            </div>

            <div>
                <label for="email">Email</label>
                <input id="email" type="email" class="readonly" readonly />
            </div>

            <div>
                <label for="createdAt">Member Since</label>
                <input id="createdAt" type="text" class="readonly" readonly />
            </div>

            <button type="submit">Update Profile</button>
        </form>

        <p id="message"></p>
    </main>

    <footer class="footer">
        <div class="container">
            <p>&copy; <span id="year"></span> MzansiBuilds.</p>
        </div>
    </footer>


</body>

</html>
